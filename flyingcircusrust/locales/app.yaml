  de: "Anstatt auf Open Fire zu würfeln, würfelst du pro Treffer, wie im Builder angezeigt, einen W10. Du verursachst eine Anzahl von Treffern gleich dem Würfelergebnis und halben Schaden, und würfelst normale Krit-Würfel wie normal. Nicht beeinflusst von Meisterschaften oder Spezialmunition. Verbraucht Treibstoffnutzungen als Munition. Brandstiftend. Maximale Reichweite ist Nahkampf. Krits entfachen immer Feuer."
  en: Rather than roll Open Fire, you roll a d10 per hit shown in the builder. You do a number of Hits equal to, and Damage half of the roll results, and roll Crit dice like normal. Not affected by Masteries or Special Ammo. Uses Fuel uses as Ammo. Incendiary. Max range is Knife. Crits always start fires.
  es: En lugar de tirar Open Fire, tiras un d10 por cada impacto mostrado en el constructor. Haces un número de Impactos igual a, y Daño la mitad de los resultados de la tirada, y tiras dados Críticos de forma normal. No afectado por Maestrías o Munición Especial. Usa usos de Combustible como Munición. Incendiario. Alcance máximo es Cuchillo. Los Críticos siempre inician incendios.
  fr: Au lieu de lancer Open Fire, vous lancez un d10 par touche indiquée dans le constructeur. Vous infligez un nombre de Touches égal à, et la moitié des Dégâts des résultats du jet, et lancez les dés de Crit comme d'habitude. Non affecté par les Maîtrises ou les Munitions Spéciales. Utilise les Utilisations de Carburant comme Munitions. Incendiaire. La portée maximale est Couteau. Les Crits déclenchent toujours des incendies.
