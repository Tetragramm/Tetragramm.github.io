  en: Can take 1 RPM to avoid a Stall.  Take 1 when you drop below Stall, and 1 every turn you start below Stall.
  es: Puede usar 1 RPM para evitar una Entrada en Pérdida. Sufre 1 cuando caes por debajo de la Entrada en Pérdida, y 1 cada turno que empiezas por debajo de la Entrada en Pérdida.
  fr: Peut utiliser 1 RPM pour éviter un Décrochage. Subissez 1 lorsque vous descendez en dessous du Décrochage, et 1 à chaque tour où vous commencez en dessous du Décrochage.
