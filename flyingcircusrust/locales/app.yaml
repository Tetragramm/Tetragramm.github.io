Autogyro Stall:
  de: "Tragschrauber-Strömungsabriss"
  en: Autogyro Stall
  es: Entrada en Pérdida de Autogiro
  fr: Décrochage d'Autogire
Autogyro Stall Warning:
  de: "Ein Tragschrauber kann keinen Strömungsabriss erleiden; er tauscht automatisch Höhe gegen Geschwindigkeit im Verhältnis 1:1. Wenn ihm die Höhe ausgeht, bevor er die Kontrolle wiedererlangt, landet er sanft. Wenn der Tragschrauber Geschwindigkeit 37 überschreitet oder negative G-Kräfte erfährt, erleidet er einen traditionelleren Strömungsabriss."
  en: "An Autogyro cannot stall, it automatically trades Altitude for speed 1-1.  If it runs out of altitude before regaining control, it lands gently.  If the autogyro exceeds speed 37 or sustains negative Gs it suffers a more traditional stall."
  es: "Un Autogiro no puede entrar en pérdida, automáticamente intercambia Altitud por velocidad 1-1. Si se queda sin altitud antes de recuperar el control, aterriza suavemente. Si el autogiro supera la velocidad 37 o sufre Gs negativos, sufre una entrada en pérdida más tradicional."
  fr: Un autogire ne peut pas décrocher, il échange automatiquement l'Altitude contre la vitesse 1 contre 1. S'il n'a plus d'altitude avant de reprendre le contrôle, il atterrit doucement. Si l'autogire dépasse la vitesse 37 ou subit des G négatifs, il subit un décrochage plus traditionnel.
